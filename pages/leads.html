<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Leads | CRM Provedor</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  />

  <link rel="stylesheet" href="../assets/css/global.css" />
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="bi bi-router-fill"></i>
        <span>CRM Net</span>
      </div>

      <nav class="sidebar-menu">
        <a href="../index.html" class="menu-item">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>

        <a href="leads.html" class="menu-item active">
          <i class="bi bi-person-plus"></i>
          <span>Leads</span>
        </a>

        <a href="atendimentos.html" class="menu-item">
          <i class="bi bi-headset"></i>
          <span>Atendimentos</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-cash-coin"></i>
          <span>Vendas</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-tools"></i>
          <span>Instalações</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-people"></i>
          <span>Clientes</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-arrow-up-circle"></i>
          <span>Upgrades</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-plus-circle"></i>
          <span>Serviços</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-bar-chart"></i>
          <span>Relatórios</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">

      <header class="topbar">
        <div>
          <h1>Leads</h1>
          <p>Cadastre e acompanhe oportunidades comerciais</p>
        </div>

        <div class="user-area">
          <span>Administrador</span>
          <div class="user-avatar">
            <i class="bi bi-person-fill"></i>
          </div>
        </div>
      </header>

      <section class="panel">
        <h3>Novo Lead</h3>

        <form id="formLead" class="form-grid">
          <input type="hidden" id="leadId" />

          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Nome do cliente" required />
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" required />
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="cliente@email.com" />
          </div>

          <div class="form-group">
            <label for="origem">Origem do contato</label>
            <select id="origem">
              <option value="WhatsApp">WhatsApp</option>
              <option value="Instagram">Instagram</option>
              <option value="Facebook">Facebook</option>
              <option value="Indicação">Indicação</option>
              <option value="Loja Física">Loja Física</option>
              <option value="Outro">Outro</option>
            </select>
          </div>

          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" placeholder="Rua, número" />
          </div>

          <div class="form-group">
            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" placeholder="Bairro" />
          </div>

          <div class="form-group">
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" placeholder="Cidade" />
          </div>

          <div class="form-group">
            <label for="cobertura">Tem cobertura?</label>
            <select id="cobertura">
              <option value="sim">Sim</option>
              <option value="nao">Não</option>
              <option value="verificar">Verificar</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="observacoes">Observações</label>
            <textarea id="observacoes" rows="3" placeholder="Observações sobre o lead"></textarea>
          </div>

          <div class="form-actions full">
            <button type="submit" class="btn-primary">
              <i class="bi bi-save"></i>
              Salvar Lead
            </button>

            <button type="reset" class="btn-secondary">
              Limpar
            </button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-header">
          <h3>Lista de Leads</h3>

          <input
            type="text"
            id="pesquisaLead"
            class="search-input"
            placeholder="Pesquisar lead..."
          />
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Origem</th>
                <th>Bairro</th>
                <th>Cobertura</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody id="tabelaLeads">
              <!-- Dados via JavaScript -->
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/leads.js"></script>
</body>
</html>
