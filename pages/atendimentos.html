<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Atendimentos | CRM Provedor</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  />

  <link rel="stylesheet" href="../assets/css/global.css" />
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="bi bi-router-fill"></i>
        <span>CRM Net</span>
      </div>

      <nav class="sidebar-menu">
        <a href="../index.html" class="menu-item">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>

        <a href="leads.html" class="menu-item">
          <i class="bi bi-person-plus"></i>
          <span>Leads</span>
        </a>

        <a href="atendimentos.html" class="menu-item active">
          <i class="bi bi-headset"></i>
          <span>Atendimentos</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-cash-coin"></i>
          <span>Vendas</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-tools"></i>
          <span>Instalações</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-people"></i>
          <span>Clientes</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-arrow-up-circle"></i>
          <span>Upgrades</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-plus-circle"></i>
          <span>Serviços</span>
        </a>

        <a href="#" class="menu-item">
          <i class="bi bi-bar-chart"></i>
          <span>Relatórios</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">

      <header class="topbar">
        <div>
          <h1>Atendimentos</h1>
          <p>Gerencie os leads enviados para atendimento comercial</p>
        </div>

        <div class="user-area">
          <span>Administrador</span>
          <div class="user-avatar">
            <i class="bi bi-person-fill"></i>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="section-header">
          <h3>Fila de Atendimento</h3>

          <input
            type="text"
            id="pesquisaAtendimento"
            class="search-input"
            placeholder="Pesquisar atendimento..."
          />
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Lead</th>
                <th>Telefone</th>
                <th>Origem</th>
                <th>Bairro</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody id="tabelaAtendimentos">
              <!-- Dados via JavaScript -->
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h3>Registrar Atendimento</h3>

        <form id="formAtendimento" class="form-grid">
          <input type="hidden" id="atendimentoId" />
          <input type="hidden" id="leadId" />

          <div class="form-group">
            <label for="nomeLead">Lead</label>
            <input type="text" id="nomeLead" readonly />
          </div>

          <div class="form-group">
            <label for="atendente">Atendente</label>
            <input type="text" id="atendente" placeholder="Nome do atendente" required />
          </div>

          <div class="form-group">
            <label for="planoApresentado">Plano apresentado</label>
            <input type="text" id="planoApresentado" placeholder="Ex: 500MB Fibra" />
          </div>

          <div class="form-group">
            <label for="interesse">Cliente interessado?</label>
            <select id="interesse">
              <option value="sim">Sim</option>
              <option value="nao">Não</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="observacoesAtendimento">Observações</label>
            <textarea
              id="observacoesAtendimento"
              rows="3"
              placeholder="Resumo do atendimento"
            ></textarea>
          </div>

          <div class="form-actions full">
            <button type="submit" class="btn-primary">
              Salvar Atendimento
            </button>

            <button type="reset" class="btn-secondary">
              Limpar
            </button>
          </div>
        </form>
      </section>

    </main>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/atendimentos.js"></script>
</body>
</html>
